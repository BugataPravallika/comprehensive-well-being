{% extends 'base.html' %}

{% block title %}Page Not Found (404){% endblock %}

{% block content %}
<div class="container text-center py-5">
    <div class="mx-auto glass-card p-5 rounded-4 shadow-lg" style="max-width: 600px;">
        <i class="fa-solid fa-compass-drafting text-indigo-400 display-1 mb-4"></i>
        <h1 class="display-5 fw-bold mb-3">404 - Page Not Found</h1>
        <p class="text-secondary mb-5">
            The page you are looking for might have been removed, had its name changed, or is temporarily unavailable. Let's get you back on track.
        </p>
        <a href="{{ url_for('home') }}" class="btn btn-premium btn-lg px-5 py-3">
            <i class="fa-solid fa-house me-2"></i> Back to Dashboard Home
        </a>
    </div>
</div>
{% endblock %}
